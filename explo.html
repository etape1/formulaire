<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Redirection…</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #8b949e;
    }
    .box { text-align: center; }
    .spinner {
      width: 32px; height: 32px;
      margin: 0 auto 16px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #58a6ff; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Redirection en cours…</p>
    <noscript>Patientez...</noscript>
  </div>

  <script>
    // ===========================================================
    //  AJOUTE / SUPPRIME TES LIENS ICI (un par ligne, entre " ")
    // ===========================================================
    const urls = [
      "https://exemple.com/url1",
      "https://exemple.com/url2",
      "https://exemple.com/url3",
      "https://exemple.com/url4",
    ];
    // ===========================================================

    if (urls.length > 0) {
      const cible = urls[Math.floor(Math.random() * urls.length)];
      window.location.replace(cible); // replace() = pas d'entrée dans l'historique
    } else {
      document.querySelector(".box").innerHTML = "Aucune URL configurée.";
    }
  </script>
</body>
</html>
