<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Léa — votre conseillère énergie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bd:#6c4cd6;        /* violet */
    --bd-dark:#5a3cc0;
    --bot:#f1f0f6;       /* bulle bot */
    --ink:#211b33;
    --ink-soft:#6b647d;
    --bg:#faf9fd;
    --ok:#1f9d57;
    --danger:#c0392b;
    --stroke:#e7e3f2;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent}
  body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  #app{max-width:460px;margin:0 auto}

  .chat{background:#fff;border:1px solid var(--stroke);border-radius:20px;overflow:hidden;margin:10px;box-shadow:0 14px 40px rgba(33,27,51,.1);display:flex;flex-direction:column;height:600px}

  /* header */
  .head{display:flex;align-items:center;gap:11px;padding:13px 16px;background:var(--bd);color:#fff;flex-shrink:0}
  .ava{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#7c5cf0);display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;flex-shrink:0}
  .ava::after{content:"";position:absolute;right:0;bottom:1px;width:11px;height:11px;border-radius:50%;background:#36d97b;border:2px solid var(--bd)}
  .head b{font-size:15.5px;font-weight:800;display:block;line-height:1.2}
  .head small{font-size:11.5px;opacity:.85;font-weight:600}
  .head .sec{margin-left:auto;font-size:10.5px;opacity:.85}

  /* messages */
  .msgs{flex:1;overflow-y:auto;padding:18px 14px 8px;background:var(--bg);display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth}
  .msg{max-width:82%;padding:11px 14px;font-size:14.5px;line-height:1.45;border-radius:16px;animation:pop .25s ease both}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.bot{align-self:flex-start;background:var(--bot);color:var(--ink);border-bottom-left-radius:5px}
  .msg.me{align-self:flex-end;background:var(--bd);color:#fff;border-bottom-right-radius:5px;font-weight:600}
  .msg.reveal{align-self:stretch;max-width:100%;text-align:center;background:linear-gradient(135deg,#efe9ff,#e4dbff);border:1px solid #cdbcf5}
  .msg b.amt{display:block;font-size:30px;font-weight:800;color:var(--bd-dark);margin:3px 0;font-family:'Nunito',sans-serif}
  .msg .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--bd);font-weight:700}
  .msg .rs{font-size:12px;color:var(--ink-soft)}
  .msg .rs strong{color:var(--ink);font-weight:700}

  .typing{align-self:flex-start;background:var(--bot);padding:13px 15px;border-radius:16px;border-bottom-left-radius:5px;display:none}
  .typing.on{display:block}
  .typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#b3acc4;margin:0 1.5px;animation:bl 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  /* composer */
  .composer{flex-shrink:0;border-top:1px solid var(--stroke);padding:12px 14px;background:#fff;min-height:64px;display:flex;flex-direction:column;gap:9px}
  .quicks{display:flex;flex-wrap:wrap;gap:8px}
  .quick{background:#fff;border:1.6px solid var(--bd);color:var(--bd);border-radius:999px;padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,color .15s,transform .12s}
  .quick:hover{background:var(--bd);color:#fff;transform:translateY(-1px)}
  .quick.lite{border-color:var(--stroke);color:var(--ink-soft)}
  .quick.lite:hover{background:var(--bot);color:var(--ink)}
  .inrow{display:flex;gap:8px;align-items:stretch}
  .inrow input{flex:1;padding:13px 15px;border:1.6px solid var(--stroke);border-radius:999px;font-size:16px;font-family:inherit;color:var(--ink);outline:none}
  .inrow input:focus{border-color:var(--bd)}
  .inrow input.bad{border-color:var(--danger)}
  .send{background:var(--bd);border:none;color:#fff;width:48px;border-radius:50%;cursor:pointer;font-size:18px;flex-shrink:0;transition:background .15s}
  .send:hover{background:var(--bd-dark)}
  .err{font-size:12px;color:var(--danger);padding:0 6px;display:none}
  .err.on{display:block}
  .legal{font-size:10.5px;color:#aaa3b8;text-align:center;line-height:1.4;padding:0 4px}

  .refbubble small{display:block;font-size:12px;color:var(--ink-soft);margin-top:4px}
</style>
</head>
<body>
<div id="app">
  <div class="chat">
    <div class="head">
      <div class="ava">👩</div>
      <div><b>Léa</b><small>Conseillère énergie · en ligne</small></div>
      <div class="sec">🔒</div>
    </div>
    <div class="msgs" id="msgs">
      <div class="typing" id="typing"><span></span><span></span><span></span></div>
    </div>
    <div class="composer" id="composer"></div>
  </div>
</div>

<script>
(function(){
  var qs=new URLSearchParams(location.search);
  var CONFIG={
    apiUrl:'https://api-leadrs-co.osc-fr1.scalingo.io',
    templateId:qs.get('templateId')||'6a3aa65ba97f30001d2e2f16',
    landingPage:qs.get('landingPage')||'mon-site.fr',
    supabaseUrl:'https://itdrjutfpasextjahjmj.supabase.co',
    supabaseKey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0ZHJqdXRmcGFzZXh0amFoam1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjQ2MzIsImV4cCI6MjA5NzgwMDYzMn0.So4UgZpdSuoISxzBQjnTMYwRn9AWwhYovPSmeeFgfiI',
    supabaseTable:'submissions',
    comparateurUrl:'https://YP3O4VbA0RGJzg7-c.vokar.co?o=3324&a=2104&k=9153&s=187723&d=3788&affclickid=&email=&firstName=&lastName=&phoneNumberMobile=&address=',
    giftName:'une carte cadeau Amazon de 100 €',
    geoip:true, geoipEndpoint:'https://ipwho.is/', emailParam:'e'
  };
  var data={ source:'funnel-pac-C', landingPage:CONFIG.landingPage, qualifie:null, answers:{ variante:'C' } };
  var emailFromUrl='';
  (function(){ var raw=qs.get('u')||qs.get(CONFIG.emailParam)||qs.get('email')||''; if(raw){ try{ var d=atob(decodeURIComponent(raw)); if(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d)) raw=d; }catch(e){} if(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(raw)){ emailFromUrl=raw; data.email=raw; } } })();

  if(CONFIG.geoip){ fetch(CONFIG.geoipEndpoint).then(function(r){return r.json();}).then(function(g){ if(g&&g.city){ var c=((g.connection&&(g.connection.org||g.connection.isp))||'')+''; if(!/mobile/i.test(c)) data.ville_ip=g.city; } }).catch(function(){}); }

  var msgs=document.getElementById('msgs'), typing=document.getElementById('typing'), composer=document.getElementById('composer');
  function scroll(){ msgs.scrollTop=msgs.scrollHeight; }
  function me(text){ var d=document.createElement('div'); d.className='msg me'; d.textContent=text; msgs.insertBefore(d,typing); scroll(); }
  function bot(html,cb,delay){ typing.classList.add('on'); scroll(); setTimeout(function(){ typing.classList.remove('on'); var d=document.createElement('div'); d.className='msg bot'; d.innerHTML=html; msgs.insertBefore(d,typing); scroll(); if(cb)cb(); }, delay||750); }
  function clearComposer(){ composer.innerHTML=''; }
  function quicks(opts){ clearComposer(); var w=document.createElement('div'); w.className='quicks'; opts.forEach(function(o){ var b=document.createElement('button'); b.className='quick'+(o.lite?' lite':''); b.textContent=o.label; b.onclick=function(){ if(!o.silent) me(o.label); clearComposer(); o.fn(o.value); }; w.appendChild(b); }); composer.appendChild(w); }
  function askText(opts){ // {placeholder,type,validate,onok}
    clearComposer();
    var row=document.createElement('div'); row.className='inrow';
    var inp=document.createElement('input'); inp.type=opts.type||'text'; inp.placeholder=opts.placeholder||''; if(opts.inputmode) inp.inputMode=opts.inputmode; if(opts.maxlength) inp.maxLength=opts.maxlength;
    var snd=document.createElement('button'); snd.className='send'; snd.innerHTML='→';
    var err=document.createElement('div'); err.className='err';
    function submit(){ var v=inp.value.trim(); var e=opts.validate?opts.validate(v):null; if(e){ err.textContent=e; err.classList.add('on'); inp.classList.add('bad'); return; } me(opts.echo?opts.echo(v):v); clearComposer(); opts.onok(v); }
    snd.onclick=submit; inp.addEventListener('keydown',function(ev){ if(ev.key==='Enter') submit(); }); inp.addEventListener('input',function(){ err.classList.remove('on'); inp.classList.remove('bad'); });
    row.appendChild(inp); row.appendChild(snd); composer.appendChild(row); composer.appendChild(err); inp.focus();
  }
  function legal(t){ var d=document.createElement('div'); d.className='legal'; d.innerHTML=t; composer.appendChild(d); }

  /* ---------- Supabase ---------- */
  function genId(){ try{ if(window.crypto&&crypto.randomUUID) return crypto.randomUUID(); }catch(e){} return 'sess-'+Date.now()+'-'+Math.random().toString(16).slice(2); }
  var SESSION=(function(){ try{ var s=localStorage.getItem('pacC_session'); if(s) return s; var id=genId(); localStorage.setItem('pacC_session',id); return id; }catch(e){ return genId(); } })();
  function saveProgress(step,complete){
    if(!CONFIG.supabaseUrl||!CONFIG.supabaseKey) return;
    var row={ session_id:SESSION, current_step:step, complete:!!complete, verticale:'pac', template_id:CONFIG.templateId, sponsor:'Rénovation · Pompe à chaleur',
      prenom:data.prenom||null, nom:data.nom||null, telephone:data.telephone||null, email:data.email||null, code_postal:data.cp||null, ville:data.ville_ip||null,
      type_logement:data.type_logement||null, statut_occupation:data.proprietaire||null, qualifie:data.qualifie, landing_page:data.landingPage, parrainages:data.parrainages||null, reponses:data.answers };
    fetch(CONFIG.supabaseUrl.replace(/\/$/,'')+'/rest/v1/'+CONFIG.supabaseTable+'?on_conflict=session_id',{ method:'POST', headers:{'Content-Type':'application/json','apikey':CONFIG.supabaseKey,'Authorization':'Bearer '+CONFIG.supabaseKey,'Prefer':'resolution=merge-duplicates,return=minimal'}, body:JSON.stringify(row) }).catch(function(){});
  }

  /* ---------- Conversation ---------- */
  function start(){
    bot("Bonjour&nbsp;! Moi c'est <b>Léa</b> 👋", function(){
      bot("En 1 minute, je vérifie le montant des aides 2026 auxquelles vous pourriez avoir droit pour remplacer votre chauffage par une pompe à chaleur. On commence&nbsp;?", function(){
        quicks([{label:"C'est parti 🚀", fn:askChauffage}]);
      });
    }, 500);
  }
  function askChauffage(){
    bot("Comment chauffez-vous votre logement aujourd'hui&nbsp;?", function(){
      quicks([
        {label:'🔥 Gaz', value:'Gaz', fn:setChauffage},
        {label:'🛢️ Fioul', value:'Fioul', fn:setChauffage},
        {label:'⚡ Électrique', value:'Électrique', fn:setChauffage},
        {label:'❓ Autre', value:'Autre', fn:setChauffage}
      ]);
    });
  }
  function setChauffage(v){ data.chauffage=v; data.answers.chauffage=v; saveProgress('q-chauffage',false); askOwner(); }
  function askOwner(){
    bot("Top. Et vous êtes bien <b>propriétaire</b> de ce logement&nbsp;? (les aides y sont réservées)", function(){
      quicks([
        {label:'🔑 Oui, propriétaire', value:'Propriétaire', fn:setOwner},
        {label:'🏘️ Non, locataire', value:'Locataire', fn:setOwner}
      ]);
    });
  }
  function setOwner(v){ data.proprietaire=v; data.answers['Propriétaire']=v;
    if(v==='Locataire'){ data.qualifie=false; saveProgress('disqualif-locataire',false); locataire(); }
    else { data.qualifie=true; saveProgress('q-proprietaire',false); askHome(); }
  }
  function askHome(){
    bot("Parfait 👍 Dans quel type de logement&nbsp;?", function(){
      quicks([
        {label:'🏡 Maison', value:'Maison', fn:setHome},
        {label:'🏢 Appartement', value:'Appartement', fn:setHome},
        {label:'🏘️ Copropriété', value:'Copropriété', fn:setHome}
      ]);
    });
  }
  function setHome(v){ data.type_logement=v; data.answers['Lieu de résidence']=v; saveProgress('q-logement',false); askCp(); }
  function askCp(){
    bot("Et votre <b>code postal</b>&nbsp;? Je vérifie les aides disponibles dans votre secteur.", function(){
      askText({ type:'text', inputmode:'numeric', maxlength:5, placeholder:'Ex : 44000',
        validate:function(v){ return /^\d{5}$/.test(v.replace(/\s/g,''))?null:'Code postal invalide (5 chiffres)'; },
        onok:function(v){ data.cp=v.replace(/\s/g,''); var aid=(data.chauffage==='Fioul'||data.chauffage==='Gaz')?10800:5150; data.answers.aides_estimees=aid; saveProgress('coordonnees-cp',false); analyze(aid); } });
    });
  }
  function analyze(aid){
    bot("Je vérifie les dispositifs 2026 dans votre commune…", function(){
      bot("J'analyse votre profil de chauffage…", function(){
        bot('<span class="lbl">🎉 Estimation de vos aides</span><b class="amt">jusqu\'à '+aid.toLocaleString('fr-FR')+'&nbsp;€*</b><span class="rs"><strong>pour remplacer votre ancien chauffage par une pompe à chaleur réversible</strong> (qui fait chauffage l\'hiver et clim l\'été). Estimation selon votre situation et les dispositifs en vigueur.</span>', function(){
          bot("Pour vous envoyer le détail, j'ai juste besoin de quelques infos. Votre <b>prénom</b>&nbsp;?", function(){
            askText({ placeholder:'Votre prénom', validate:function(v){return v.trim().length>=2?null:'Indiquez votre prénom';}, onok:function(v){ data.prenom=v.trim(); askNom(); } });
          });
        }, 900);
      }, 850);
    }, 850);
  }
  function askNom(){
    bot("Enchantée, "+data.prenom+"&nbsp;! Et votre <b>nom</b>&nbsp;?", function(){
      askText({ placeholder:'Votre nom', validate:function(v){return v.trim().length>=2?null:'Indiquez votre nom';}, onok:function(v){ data.nom=v.trim(); saveProgress('coordonnees-nom',false); askPhone(); } });
    });
  }
  function askPhone(){
    bot("Super, j'ai toutes les informations qu'il faut pour qu'un conseiller vous aide à <b>remplacer votre ancien chauffage par une pompe à chaleur réversible</b> (qui fait chauffage l'hiver et clim l'été) tout en profitant des aides de l'État 💪", function(){
      bot("📞 Sur quel <b>numéro</b> un conseiller <b>spécialisé en pompe à chaleur</b> peut vous appeler pour vous donner le résultat de votre <b>étude personnalisée</b> et le montant de vos aides&nbsp;?", function(){
        bot("Si votre dossier n'est pas retenu, vous serez simplement prévenu par email, sans aucun appel 🙂", function(){
          askText({ type:'tel', inputmode:'tel', placeholder:'06 12 34 56 78',
            validate:function(v){ return /^(?:\+33|0033|0)[1-9]\d{8}$/.test(v.replace(/[\s.\-()]/g,''))?null:'Numéro invalide'; },
            onok:function(v){ data.telephone=v.replace(/[\s.\-()]/g,''); if(emailFromUrl) confirmEmail(); else submitLead(); } });
        }, 600);
      });
    });
  }
  function confirmEmail(){
    bot("Et je vous envoie le récapitulatif sur <b>"+emailFromUrl+"</b>, c'est bien ça&nbsp;?", function(){
      quicks([
        {label:'✅ Oui, parfait', fn:function(){ data.email=emailFromUrl; submitLead(); }},
        {label:'✏️ Non, corriger', fn:function(){ bot("Pas de souci, quel est le bon email&nbsp;?", function(){ askText({ type:'email', placeholder:'vous@exemple.fr', validate:function(v){return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v.trim())?null:'Email invalide';}, onok:function(v){ data.email=v.trim(); submitLead(); } }); }); }}
      ]);
    });
  }
  function submitLead(){
    clearComposer();
    bot("Je transmets votre demande… ⏳", function(){
      saveProgress('complete',true);
      var payload={ 'Prénom':data.prenom,'Nom':data.nom,'Téléphone':data.telephone,'Code postal':data.cp,'Lieu de résidence':data.type_logement,'Propriétaire':data.proprietaire };
      var params=new URLSearchParams(); if(CONFIG.landingPage) params.set('landingPage',CONFIG.landingPage);
      var url=CONFIG.apiUrl+'/lead/public/generic-form/'+CONFIG.templateId+(params.toString()?'?'+params.toString():'');
      fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
        .then(function(r){return r.json().then(function(d){return {s:r.status,d:d};});})
        .then(function(res){ if(res.s===200&&res.d&&res.d.type==='success'){ try{localStorage.removeItem('pacC_funnel');}catch(e){}
            bot("✅ C'est enregistré, merci "+data.prenom+"&nbsp;!", function(){ bot("Un conseiller va vérifier votre dossier, puis vous recontactera pour vous transmettre le détail de vos aides et votre estimation personnalisée. À très vite&nbsp;! 🙌", function(){ legal('En soumettant cette demande, vous acceptez d\'être contacté par nos partenaires. Estimation indicative et non contractuelle.'); }); }); }
          else { throw new Error('err'); } })
        .catch(function(){ bot("Oups, un souci technique est survenu 😕", function(){ quicks([{label:'Réessayer', fn:submitLead}]); }); });
    });
  }
  /* locataire */
  function locataire(){
    bot("Ah&nbsp;! Ces aides sont malheureusement réservées aux propriétaires 😅", function(){
      bot("Mais ne repartez pas les mains vides&nbsp;: tentez de gagner <b>"+CONFIG.giftName+"</b> 🎁 en parrainant un proche propriétaire intéressé.", function(){
        quicks([
          {label:'🎁 Participer', fn:function(){ bot("Génial&nbsp;! L'email d'un proche propriétaire&nbsp;?", function(){ askText({ type:'email', placeholder:'email@proche.fr', validate:function(v){return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v.trim())?null:'Email invalide';}, onok:function(v){ data.parrainages=[v.trim()]; saveProgress('parrainage',true); bot("Merci, c'est noté&nbsp;! Bonne chance pour le tirage 🍀"); } }); }); }},
          {label:'Voir le comparateur d\'énergie', lite:true, fn:function(){ if(CONFIG.comparateurUrl){ var em=emailFromUrl||data.email||''; var dest=CONFIG.comparateurUrl.replace('&email=', '&email='+encodeURIComponent(em)); try{ window.top.location.href=dest; }catch(e){ window.location.href=dest; } } }}
        ]);
      });
    });
  }

  if(emailFromUrl){ saveProgress('page-vue',false); }
  start();
})();
</script>
</body>
</html>
